name: Build & Deploy Angular Multi-Client

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: PROD

    strategy:
      matrix:
        client: [hcmaia, advalongo, cis]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Angular (${{ matrix.client }})
        run: |
          sed -i "s/apiUrl: '.*'/apiUrl: ''/" src/environments/environment.${{ matrix.client }}.ts
          npm run build:${{ matrix.client }}

      - name: Remove assets folder
        run: rm -rf dist/assets

      - name: Debug dist
        run: find dist

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "dist/**"
          target: "/SM/www/${{ matrix.client }}"
          strip_components: 1
