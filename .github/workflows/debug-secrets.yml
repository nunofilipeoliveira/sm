name: Build & Deploy Angular Multi-Client

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: PROD

    strategy:
      matrix:
        client: [hcmaia, advalongo, cis]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Angular (${{ matrix.client }})
        run: npm run build:${{ matrix.client }}

      - name: Remove assets folder before upload
        run: rm -rf dist/${{ matrix.client }}/assets

      - name: Check SSH secrets
        run: |
          echo "Checking SSH secrets..."
          if [ -z "${{ secrets.SSH_HOST }}" ] || \
             [ -z "${{ secrets.SSH_USER }}" ] || \
             [ -z "${{ secrets.SSH_KEY }}" ]; then
            echo "ERROR: Required SSH secrets are missing."
            exit 1
          fi

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "dist/*"
          target: "/root/SM/www/${{ matrix.client }}"
          
